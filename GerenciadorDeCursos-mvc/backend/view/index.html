<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Cursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .nav-tabs .nav-link.active { font-weight: bold; }
        .table-responsive { margin-top: 1rem; }
        .modal-header { background-color: #0d6efd; color: white; }
        .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; }
    </style>
</head>
<body>

<div class="container py-4">
    <h2 class="mb-4">Gerenciador de Cursos</h2>

    <ul class="nav nav-tabs mb-4" id="tabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-students">Alunos</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-courses">Cursos</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-enrollments">Inscrições</button>
        </li>
    </ul>

    <div class="tab-content">

        <div class="tab-pane fade show active" id="tab-students">
            <div class="d-flex justify-content-between align-items-center">
                <h5>Alunos</h5>
                <button class="btn btn-primary btn-sm" onclick="openStudentModal()">+ Novo Aluno</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                        <tr><th>ID</th><th>Nome</th><th>Email</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="students-table"></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-courses">
            <div class="d-flex justify-content-between align-items-center">
                <h5>Cursos</h5>
                <button class="btn btn-primary btn-sm" onclick="openCourseModal()">+ Novo Curso</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                        <tr><th>ID</th><th>Título</th><th>Descrição</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="courses-table"></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-enrollments">
            <div class="d-flex justify-content-between align-items-center">
                <h5>Inscrições</h5>
                <button class="btn btn-primary btn-sm" onclick="openEnrollmentModal()">+ Nova Inscrição</button>
            </div>
            <div class="table-responsive">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                        <tr><th>Aluno</th><th>Curso</th><th>Ações</th></tr>
                    </thead>
                    <tbody id="enrollments-table"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="studentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="studentModalTitle">Aluno</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="student-id">
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" id="student-name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="student-email">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="saveStudent()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="courseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="courseModalTitle">Curso</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="course-id">
                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" id="course-title">
                </div>
                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" id="course-description" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="saveCourse()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="enrollmentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Nova Inscrição</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Aluno</label>
                    <select class="form-select" id="enrollment-student"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Curso</label>
                    <select class="form-select" id="enrollment-course"></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="saveEnrollment()">Inscrever</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="toast-msg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = 'http://localhost:3000';

    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.className = `toast align-items-center text-white border-0 bg-${type}`;
        document.getElementById('toast-msg').textContent = msg;
        bootstrap.Toast.getOrCreateInstance(el).show();
    }

    async function loadStudents() {
        const res = await fetch(`${API}/students`);
        const students = await res.json();
        const tbody = document.getElementById('students-table');
        tbody.innerHTML = students.map(s => `
            <tr>
                <td>${s.id}</td>
                <td>${s.name}</td>
                <td>${s.email}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="openStudentModal(${s.id}, '${s.name}', '${s.email}')">Editar</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Excluir</button>
                </td>
            </tr>`).join('');
    }

    function openStudentModal(id = '', name = '', email = '') {
        document.getElementById('student-id').value = id;
        document.getElementById('student-name').value = name;
        document.getElementById('student-email').value = email;
        document.getElementById('studentModalTitle').textContent = id ? 'Editar Aluno' : 'Novo Aluno';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('studentModal')).show();
    }

    async function saveStudent() {
        const id = document.getElementById('student-id').value;
        const name = document.getElementById('student-name').value.trim();
        const email = document.getElementById('student-email').value.trim();
        if (!name || !email) return showToast('Preencha todos os campos.', 'danger');

        const url = id ? `${API}/students/${id}` : `${API}/students`;
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email })
        });
        const data = await res.json();
        bootstrap.Modal.getOrCreateInstance(document.getElementById('studentModal')).hide();
        showToast(data.message);
        loadStudents();
    }

    async function deleteStudent(id) {
        if (!confirm('Remover este aluno?')) return;
        const res = await fetch(`${API}/students/${id}`, { method: 'DELETE' });
        const data = await res.json();
        showToast(data.message, res.ok ? 'success' : 'danger');
        loadStudents();
    }

    async function loadCourses() {
        const res = await fetch(`${API}/courses`);
        const courses = await res.json();
        const tbody = document.getElementById('courses-table');
        tbody.innerHTML = courses.map(c => `
            <tr>
                <td>${c.id}</td>
                <td>${c.title}</td>
                <td>${c.description}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="openCourseModal(${c.id}, '${c.title}', \`${c.description}\`)">Editar</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id})">Excluir</button>
                </td>
            </tr>`).join('');
        return courses;
    }

    function openCourseModal(id = '', title = '', description = '') {
        document.getElementById('course-id').value = id;
        document.getElementById('course-title').value = title;
        document.getElementById('course-description').value = description;
        document.getElementById('courseModalTitle').textContent = id ? 'Editar Curso' : 'Novo Curso';
        bootstrap.Modal.getOrCreateInstance(document.getElementById('courseModal')).show();
    }

    async function saveCourse() {
        const id = document.getElementById('course-id').value;
        const title = document.getElementById('course-title').value.trim();
        const description = document.getElementById('course-description').value.trim();
        if (!title || !description) return showToast('Preencha todos os campos.', 'danger');

        const url = id ? `${API}/courses/${id}` : `${API}/courses`;
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description })
        });
        const data = await res.json();
        bootstrap.Modal.getOrCreateInstance(document.getElementById('courseModal')).hide();
        showToast(data.message);
        loadCourses();
    }

    async function deleteCourse(id) {
        if (!confirm('Remover este curso?')) return;
        const res = await fetch(`${API}/courses/${id}`, { method: 'DELETE' });
        const data = await res.json();
        showToast(data.message, res.ok ? 'success' : 'danger');
        loadCourses();
    }

    async function loadEnrollments() {
        const res = await fetch(`${API}/enrollments`);
        const enrollments = await res.json();
        const tbody = document.getElementById('enrollments-table');
        tbody.innerHTML = enrollments.map(e => `
            <tr>
                <td>${e.student_name} (ID ${e.student_id})</td>
                <td>${e.course_title} (ID ${e.course_id})</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="cancelEnrollment(${e.student_id}, ${e.course_id})">Cancelar</button>
                </td>
            </tr>`).join('');
    }

    async function openEnrollmentModal() {
        const [resStudents, resCourses] = await Promise.all([
            fetch(`${API}/students`),
            fetch(`${API}/courses`)
        ]);
        const students = await resStudents.json();
        const courses = await resCourses.json();

        document.getElementById('enrollment-student').innerHTML =
            students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        document.getElementById('enrollment-course').innerHTML =
            courses.map(c => `<option value="${c.id}">${c.title}</option>`).join('');

        bootstrap.Modal.getOrCreateInstance(document.getElementById('enrollmentModal')).show();
    }

    async function saveEnrollment() {
        const student_id = document.getElementById('enrollment-student').value;
        const course_id = document.getElementById('enrollment-course').value;

        const res = await fetch(`${API}/enrollments`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student_id: parseInt(student_id), course_id: parseInt(course_id) })
        });
        const data = await res.json();
        bootstrap.Modal.getOrCreateInstance(document.getElementById('enrollmentModal')).hide();
        showToast(data.message, res.ok ? 'success' : 'danger');
        loadEnrollments();
    }

    async function cancelEnrollment(student_id, course_id) {
        if (!confirm('Cancelar esta inscrição?')) return;
        const res = await fetch(`${API}/enrollments`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ student_id, course_id })
        });
        const data = await res.json();
        showToast(data.message, res.ok ? 'success' : 'danger');
        loadEnrollments();
    }

    document.querySelectorAll('[data-bs-toggle="tab"]').forEach(btn => {
        btn.addEventListener('shown.bs.tab', e => {
            const target = e.target.getAttribute('data-bs-target');
            if (target === '#tab-students') loadStudents();
            if (target === '#tab-courses') loadCourses();
            if (target === '#tab-enrollments') loadEnrollments();
        });
    });

    loadStudents();
</script>
</body>
</html>
